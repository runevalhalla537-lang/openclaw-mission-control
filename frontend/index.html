<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Mission Control</h1>
      <div class="top-actions">
        <label class="muted">Mode
          <select id="modeSelect">
            <option value="eco" selected>Eco</option>
            <option value="live">Live</option>
          </select>
        </label>
        <label class="muted">Agents
          <select id="agentsInterval">
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="60">60s</option>
            <option value="0">Manual</option>
          </select>
        </label>
        <span id="last">--</span>
        <button id="refresh">Refresh</button>
      </div>
    </header>

    <main>
      <section>
        <h2>System Health</h2>
        <div id="healthSummary" class="kv"></div>
        <h3>Agent Model Runtime</h3>
        <div id="runtimeModels"></div>
        <h3>Host Utilization</h3>
        <div id="runtimeStats"></div>
      </section>

      <section>
        <h2>Agents</h2>
        <div id="agentsCount" class="muted"></div>
        <div id="agentsCards" class="cards"></div>
      </section>

      <section>
        <h2>Subagents</h2>
        <div id="subagents" class="muted"></div>
      </section>

      <section>
        <h2>Active Sessions (last 4h)</h2>
        <div id="sessionsCount" class="muted"></div>
        <div id="sessionsTable"></div>
      </section>

      <section>
        <h2>Cron Jobs</h2>
        <div id="cronCount" class="muted"></div>
        <div id="cronTable"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
